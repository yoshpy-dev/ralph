name: check-template

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check scaffold structure
        run: ./scripts/check-template.sh
      - name: Check template sync
        run: ./scripts/check-sync.sh
